version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/static/sprites"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"
